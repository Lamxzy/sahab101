{% extends 'base.html' %}
{% block content %}

<h2>Results</h2>

<table>
<tr><th>Name</th><th>Course</th><th>Score</th></tr>

{% for r in results %}
<tr>
    <td>{{r[0]}}</td>
    <td>{{r[1]}}</td>
    <td>{{r[2]}}</td>
</tr>
{% endfor %}

</table>

<form method="POST" action="/add_course">
    <input name="student_id" placeholder="Student ID">
    <input name="course_name" placeholder="Course">
    <input name="score" placeholder="Score">
    <button>Add Course</button>
</form>

{% endblock %}
