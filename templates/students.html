{% extends 'base.html' %}
{% block content %}

<h2>Students List</h2>
<form action="/search" method="GET">
    <input type="text" name="q" placeholder="Search student...">
    <button type="submit">Search</button>
</form>
<table>

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Department</th>
    <th>Level</th>
    <th>Actions</th>
</tr>

{% for s in students %}
<tr>
    <td>{{s[0]}}</td>
    <td>{{s[1]}}</td>
    <td>{{s[2]}}</td>
    <td>{{s[3]}}</td>

    <td class="action-links">
        <a href="/delete_student/{{s[0]}}">Delete</a>
        <a href="/update_student/{{s[0]}}">Edit</a>
    </td>
</tr>
{% endfor %}

</table>

{% endblock %}
