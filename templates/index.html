<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIWES System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h1>Student Performance Management System</h1>

    <div class="grid">
        <div class="card">
            <h2>Add Student</h2>
            <form action="/add_student" method="POST">
                <input type="text" name="name" placeholder="Student Name" required>
                <input type="text" name="department" placeholder="Department" required>
                <input type="text" name="level" placeholder="Level" required>
                <button type="submit">Add Student</button>
            </form>
        </div>

        <div class="card">
            <h2>Add Course</h2>
            <form action="/add_course" method="POST">
                <input type="number" name="student_id" placeholder="Student ID" required>
                <input type="text" name="course_name" placeholder="Course Name" required>
                <input type="number" name="score" placeholder="Score" required>
                <button type="submit">Add Course</button>
            </form>
        </div>
    </div>

    <div class="links">
        <a href="/students">Students</a>
        <a href="/results">Results</a>
        <a href="/performance">Performance</a>
        <a href="/top_students">Top 3</a>
        <a href="/grades">Grades</a>
    </div>
</div>
</body>
</html>
